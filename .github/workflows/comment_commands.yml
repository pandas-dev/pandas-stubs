name: Comment Commands to Trigger CI
on:
  issue_comment:
    types: created

permissions: {}

jobs:
  optional_tests:
    name: "Optional tests run"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read
      contents: read
      actions: write
      checks: write
    # if more commands are added, they will need to be added here too as we don't have access to env at this stage
    if: (github.event.issue.pull_request) && contains(fromJSON('["/pandas_nightly", "/mypy_nightly", "/mypy_strict", "/pyrefly_strict", "/pyrefly_all", "/ty_all"]'), github.event.comment.body) && github.event.comment.author_association == 'MEMBER'

    steps:
      - name: Resolve comment command
        id: command
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          case "${COMMENT_BODY}" in
            /pandas_nightly)
              echo "poe_command=pytest --nightly" >> "${GITHUB_OUTPUT}"
              echo "check_name=Pandas nightly tests" >> "${GITHUB_OUTPUT}"
              ;;
            /mypy_nightly)
              echo "poe_command=mypy --mypy_nightly" >> "${GITHUB_OUTPUT}"
              echo "check_name=Mypy nightly tests" >> "${GITHUB_OUTPUT}"
              ;;
            /mypy_strict)
              echo "poe_command=mypy_strict" >> "${GITHUB_OUTPUT}"
              echo "check_name=Mypy strict tests" >> "${GITHUB_OUTPUT}"
              ;;
            /pyrefly_strict)
              echo "poe_command=pyrefly_strict" >> "${GITHUB_OUTPUT}"
              echo "check_name=Pyrefly tests strict preset" >> "${GITHUB_OUTPUT}"
              ;;
            /pyrefly_all)
              echo "poe_command=pyrefly_all" >> "${GITHUB_OUTPUT}"
              echo "check_name=Pyrefly tests all preset" >> "${GITHUB_OUTPUT}"
              ;;
            /ty_all)
              echo "poe_command=ty_all" >> "${GITHUB_OUTPUT}"
              echo "check_name=Ty tests all rules raising errors" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Unknown command: ${COMMENT_BODY}" >&2
              exit 1
              ;;
          esac

      - name: Get head sha, branch name and store value
        # get the sha of the last commit to attach the results of the tests
        if: always()
        id: get-branch-info
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PULL_NUMBER: ${{ github.event.issue.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PULL_NUMBER),
            })
            core.setOutput('sha', pr.data.head.sha)
            core.setOutput('branch', pr.data.head.ref)
            core.setOutput('repository', pr.data.head.repo.full_name)

      - name: Checkout code on the correct branch
        uses: actions/checkout@v7
        with:
          # context is not aware which branch to checkout so it would otherwise
          # default to main (we also need repo name to source from the right user
          # otherwise it will look for the branch in pandas-stubs repo)
          ref: ${{ steps.get-branch-info.outputs.branch }}
          repository: ${{ steps.get-branch-info.outputs.repository }}
          persist-credentials: false

      - name: Install project dependencies
        uses: ./.github/setup
        with:
          os: ubuntu-latest
          python-version: "3.12"

      - name: Run optional tests
        # run the tests based on the value of the comment
        id: tests-step
        shell: bash
        env:
          POE_COMMAND: ${{ steps.command.outputs.poe_command }}
        run: poetry run poe $POE_COMMAND

      - name: Report results of the tests and publish
        # publish the results to a check run no matter the pass or fail
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          CHECK_NAME: ${{ steps.command.outputs.check_name }}
          HEAD_SHA: ${{ steps.get-branch-info.outputs.sha }}
          CONCLUSION: ${{ steps.tests-step.outcome }}
          ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.checks.create({
              name: process.env.CHECK_NAME,
              head_sha: process.env.HEAD_SHA,
              status: 'completed',
              conclusion: process.env.CONCLUSION,
              output: {
                title: `Run ${process.env.CHECK_NAME}`,
                summary: `Results: ${process.env.CONCLUSION}`,
                text: `See the actions run at ${process.env.ACTIONS_RUN_URL}`,
              },
              owner: context.repo.owner,
              repo: context.repo.repo
            })
